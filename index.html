<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Embolia Planner - Simulador Completo</title>
    <style>
        body { font-family: sans-serif; background-color: #0c0c0e; color: #e1e1e6; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        .planner-layout { display: grid; grid-template-columns: 350px 1fr 280px; gap: 10px; height: 100%; }
        .panel { background: #121214; border: 1px solid #29292e; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-y { overflow-y: auto; flex-grow: 1; }
        .skill-row { display: grid; grid-template-columns: 30px repeat(3, 1fr); gap: 5px; margin-bottom: 5px; }
        .skill-slot { width: 60px; height: 60px; background: #1a1a1e; border: 1px solid #3a3a42; font-size: 8px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; position: relative; }
        .skill-slot.active { border-color: #00e676; }
        .slot { width: 80px; height: 80px; border: 1px dashed #3a3a42; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; text-align: center; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #121214; padding: 20px; border: 1px solid #00e676; z-index: 1000; width: 300px; }
        #buscador { width: 100%; padding: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="planner-layout">
        <div class="panel">
            <h2>Habilidades</h2>
            <select id="class-select" onchange="cambiarClase()"><option value="ninja">Ninja</option><option value="guerrero">Guerrero</option><option value="mago">Mago</option></select>
            <div id="skills-container" class="scroll-y"></div>
        </div>
        <div class="panel">
            <h2>Equipamiento</h2>
            <div id="equipo-grid" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                <div class="slot" id="slot-helmet" onclick="abrirSelector('helmet')">Casco</div>
                <div class="slot" id="slot-chest" onclick="abrirSelector('chest')">Pechera</div>
                <div class="slot" id="slot-weapon" onclick="abrirSelector('weapon')">Arma</div>
                <div class="slot" id="slot-boots" onclick="abrirSelector('boots')">Botas</div>
            </div>
        </div>
        <div class="panel"><h2>Stats</h2><div id="stats-display"></div></div>
    </div>
    <div class="modal" id="modal">
        <input type="text" id="buscador" placeholder="Buscar ítem..." oninput="filtrarItems()">
        <div id="modal-list" class="scroll-y" style="max-height: 300px;"></div>
        <button onclick="cerrarSelector()">Cerrar</button>
    </div>
    <script>
        let itemsDatabase = [], slotActual = null, equipado = {};
        const skillTrees = {
            ninja: Array.from({length:10}, (_, i) => ({row: i+1, col: 1, name: "Habilidad "+(i+1), max: 5, current: 0})),
            guerrero: Array.from({length:10}, (_, i) => ({row: i+1, col: 1, name: "Tajo "+(i+1), max: 5, current: 0})),
            mago: Array.from({length:10}, (_, i) => ({row: i+1, col: 1, name: "Hechizo "+(i+1), max: 5, current: 0}))
        };

        async function inicializar() {
            const res = await fetch('item.txt');
            const text = await res.text();
            text.split('\n').forEach(linea => { if(linea.includes('item_name_')) itemsDatabase.push({id: linea.split('item_name_')[1].split('=>')[0].trim(), nombre: linea.split('=>')[1].trim()}); });
            cambiarClase();
        }

        function cambiarClase() {
            const container = document.getElementById('skills-container');
            container.innerHTML = '';
            skillTrees[document.getElementById('class-select').value].forEach(s => {
                container.innerHTML += `<div class="skill-row"><div class="row-number">${s.row}</div><div class="skill-slot" onclick="sumarSkill('${s.name}')">${s.name}<div class="skill-points">${s.current}/${s.max}</div></div></div>`;
            });
        }

        function abrirSelector(slot) {
            slotActual = slot;
            document.getElementById('modal').style.display = 'block';
            filtrarItems('');
        }

        function filtrarItems() {
            const query = document.getElementById('buscador').value.toLowerCase();
            const list = document.getElementById('modal-list');
            list.innerHTML = `<button onclick="equiparItem(null)">❌ Desequipar</button>`;
            itemsDatabase.filter(i => i.nombre.toLowerCase().includes(query)).forEach(item => {
                list.innerHTML += `<button onclick="equiparItem('${item.nombre}')" style="display:block; width:100%">${item.nombre}</button>`;
            });
        }

        function equiparItem(nombre) {
            equipado[slotActual] = nombre;
            document.getElementById('slot-'+slotActual).innerText = nombre || "Vacío";
            cerrarSelector();
        }

        function cerrarSelector() { document.getElementById('modal').style.display = 'none'; }
        
        inicializar();
    </script>
</body>
</html>
