<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle For Embolia - Items & Stats</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0c0e;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            color: #00e676;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
            margin-bottom: 30px;
        }
        #buscador {
            width: 100%;
            padding: 14px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 1px solid #29292e;
            background-color: #121214;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        #buscador:focus {
            border-color: #00e676;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #121214;
            border: 1px solid #29292e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: #41414c;
        }
        .card-header h3 {
            margin: 0 0 5px 0;
            color: #ffca28;
            font-size: 18px;
        }
        .item-id {
            color: #7c7c8a;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            background-color: #29292e;
        }
        /* Colores por tipo de ítem */
        .badge-arma { background-color: #e53935; color: #fff; }
        .badge-armadura { background-color: #1e88e5; color: #fff; }
        .badge-pico { background-color: #ffb300; color: #000; }
        .badge-otros { background-color: #757575; color: #fff; }

        .stats-container {
            border-top: 1px solid #29292e;
            padding-top: 12px;
            margin-top: auto;
        }
        .stat-line {
            font-size: 13px;
            margin: 6px 0;
            display: flex;
            flex-direction: column;
        }
        .stat-name {
            color: #00e676;
            font-weight: 600;
        }
        .stat-desc {
            color: #a8a8b3;
            font-size: 11px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Battle For Embolia Database 🛡️</h1>
        <input type="text" id="buscador" placeholder="Buscar ítem por nombre, ID o tipo...">
        <div id="items-container" class="grid">
            <p>Procesando ítems y estadísticas...</p>
        </div>
    </div>

    <script>
        // Diccionarios globales para guardar lo que leamos de los archivos
        let statsDatabase = {};
        let itemsList = [];

        async function cargarDatos() {
            try {
                // 1. Leer y procesar stats.txt
                const resStats = await fetch('stats.txt');
                const textStats = await resStats.text();
                
                textStats.split('\n').forEach(linea => {
                    if (linea.includes('=>')) {
                        const [llave, valor] = linea.split('=>');
                        const keyClean = llave.replace('stats/', '').trim();
                        
                        // Separamos si es el nombre del stat o su descripción (_desc)
                        if (keyClean.endsWith('_desc')) {
                            const baseKey = keyClean.replace('_desc', '');
                            if (!statsDatabase[baseKey]) statsDatabase[baseKey] = {};
                            statsDatabase[baseKey].desc = valor.trim();
                        } else {
                            if (!statsDatabase[keyClean]) statsDatabase[keyClean] = {};
                            statsDatabase[keyClean].nombre = valor.trim();
                        }
                    }
                });

                // 2. Leer y procesar item.txt
                const resItems = await fetch('item.txt');
                const textItems = await resItems.text();
                
                textItems.split('\n').forEach(linea => {
                    if (linea.includes('=>')) {
                        const [llave, valor] = linea.split('=>');
                        
                        if (llave.includes('item_name_')) {
                            const id = llave.split('item_name_')[1].trim();
                            const nombre = valor.trim();
                            
                            // Determinamos el tipo de ítem de manera inteligente para asignarle stats lógicos
                            let tipo = "Otros";
                            let statsAsignados = [];

                            const nombreMinusculo = nombre.toLowerCase();

                            if (nombreMinusculo.includes('espada') || nombreMinusculo.includes('daga') || nombreMinusculo.includes('báculo') || nombreMinusculo.includes('palo') || nombreMinusculo.includes('maza') || nombreMinusculo.includes('maso')) {
                                tipo = "Arma";
                                statsAsignados = ['ataque', 'attackSpeed', 'critico'];
                            } else if (nombreMinusculo.includes('armadura') || nombreMinusculo.includes('casco') || nombreMinusculo.includes('botas') || nombreMinusculo.includes('guantes') || nombreMinusculo.includes('túnica') || nombreMinusculo.includes('corona')) {
                                tipo = "Armadura";
                                statsAsignados = ['defensa', 'life', 'regeneracionVida'];
                            } else if (nombreMinusculo.includes('pico')) {
                                tipo = "Pico";
                                statsAsignados = ['mineSpeed', 'mineQuantity', 'mineRarity'];
                            } else if (nombreMinusculo.includes('anillo') || nombreMinusculo.includes('collar')) {
                                tipo = "Accesorio";
                                statsAsignados = ['magicFind', 'manaMaxima', 'regeneracionMana'];
                            }

                            itemsList.push({
                                id: id,
                                nombre: nombre,
                                tipo: tipo,
                                stats: statsAsignados
                            });
                        }
                    }
                });

                mostrarItems(itemsList);

                // Buscador funcional en tiempo real
                document.getElementById('buscador').addEventListener('input', (e) => {
                    const busqueda = e.target.value.toLowerCase();
                    const filtrados = itemsList.filter(item => 
                        item.nombre.toLowerCase().includes(busqueda) || 
                        item.id.toString().includes(busqueda) ||
                        item.tipo.toLowerCase().includes(busqueda)
                    );
                    mostrarItems(filtrados);
                });

            } catch (error) {
                console.error("Error cargando base de datos:", error);
                document.getElementById('items-container').innerHTML = "<p>Error al cargar los datos.</p>";
            }
        }

        function mostrarItems(lista) {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            
            if (lista.length === 0) {
                container.innerHTML = '<p>No se encontraron ítems.</p>';
                return;
            }

            lista.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Generamos el HTML para los stats asociados a esta tarjeta
                let statsHtml = '';
                if (item.stats && item.stats.length > 0) {
                    statsHtml = `<div class="stats-container">`;
                    item.stats.forEach(statKey => {
                        const statInfo = statsDatabase[statKey];
                        if (statInfo) {
                            const nombreStat = statInfo.nombre || statKey;
                            const descStat = statInfo.desc || "Sin descripción.";
                            statsHtml += `
                                <div class="stat-line">
                                    <span class="stat-name">✦ ${nombreStat}</span>
                                    <span class="stat-desc">${descStat}</span>
                                </div>
                            `;
                        }
                    });
                    statsHtml += `</div>`;
                }

                // Determinamos la clase CSS del badge de tipo
                const badgeClass = `badge badge-${item.tipo.toLowerCase().replace('accesorio', 'otros')}`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="${badgeClass}">${item.tipo}</span>
                        <h3>${item.nombre}</h3>
                        <div class="item-id">ID de Item: #${item.id}</div>
                    </div>
                    ${statsHtml}
                `;
                container.appendChild(card);
            });
        }

        cargarDatos();
    </script>
</body>
</html>
